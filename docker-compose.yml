services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - archvision

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ifc_files:/app/generated
    env_file:
      - ./backend/.env
    environment:
      - IFC_OUTPUT_DIR=/app/generated
    networks:
      - archvision

volumes:
  ifc_files:

networks:
  archvision:
    driver: bridge
