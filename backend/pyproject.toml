[tool.black]
line-length = 100
target-version = ["py311"]

[tool.ruff]
line-length = 100
target-version = "py311"
# Keep generated output and virtualenvs out of scope.
extend-exclude = ["generated", ".venv"]

[tool.ruff.lint]
# Sensible defaults: pyflakes (F), pycodestyle (E/W), isort (I),
# pyupgrade (UP), flake8-bugbear (B), comprehensions (C4).
select = ["E", "W", "F", "I", "UP", "B", "C4"]
ignore = [
  "E501", # line length is handled by the formatter
]

[tool.ruff.format]
quote-style = "double"
